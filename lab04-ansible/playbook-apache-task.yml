---
# ZADANIE STUDENCKIE
#
# Uzupełnij playbook tak, aby skonfigurował Apache na maszynie utworzonej przez Terraform.
#
# Wymagania:
# 1. Zaktualizuj cache apt.
# 2. Zainstaluj apache2.
# 3. Uruchom usługę apache2.
# 4. Włącz start apache2 razem z systemem.
# 5. Skopiuj plik files/index.html na /var/www/html/index.html.
#
# Podpowiedzi:
# - użyj modułów: apt, service, copy
# - ustaw become: true
# - po wykonaniu playbooka sprawdź stronę: http://PUBLIC_IP

- name: Konfiguracja Apache na maszynie VM na ocenę 3.0
  hosts: webservers
  become: true

  tasks:
    - name: Aktualizacja cache apt
      apt:
        update_cache: yes

    - name: Instalacja Apache
      apt:
        name: apache2
        state: present

    - name: Uruchomienie uslugi Apache
      service:
        name: apache2
        state: started

    - name: Wlaczenie Apache przy starcie systemu
      service:
        name: apache2
        enabled: yes

    - name: Skopiowanie pliku index.html
      copy:
        src: files/kostka.html
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'
