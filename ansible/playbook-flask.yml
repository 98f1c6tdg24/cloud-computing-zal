---
- name: Konfiguracja demonstracyjnego serwera Flask
  hosts: webservers
  become: true

  tasks:
    - name: Aktualizacja cache apt
      apt:
        update_cache: yes

    - name: Instalacja pakietow systemowych dla Flask
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
        state: present

    - name: Utworzenie katalogu aplikacji
      file:
        path: /opt/iac-flask-demo
        state: directory
        owner: azureuser
        group: azureuser
        mode: '0755'

    - name: Skopiowanie aplikacji Flask
      copy:
        src: ../app/app.py
        dest: /opt/iac-flask-demo/app.py
        owner: azureuser
        group: azureuser
        mode: '0644'

    - name: Skopiowanie requirements.txt
      copy:
        src: ../app/requirements.txt
        dest: /opt/iac-flask-demo/requirements.txt
        owner: azureuser
        group: azureuser
        mode: '0644'

    - name: Utworzenie virtualenv
      command: python3 -m venv /opt/iac-flask-demo/venv
      args:
        creates: /opt/iac-flask-demo/venv/bin/activate

    - name: Instalacja zaleznosci Python
      pip:
        requirements: /opt/iac-flask-demo/requirements.txt
        virtualenv: /opt/iac-flask-demo/venv

    - name: Utworzenie uslugi systemd dla Flask
      copy:
        dest: /etc/systemd/system/iac-flask-demo.service
        content: |
          [Unit]
          Description=IaC Flask Demo
          After=network.target

          [Service]
          User=azureuser
          WorkingDirectory=/opt/iac-flask-demo
          ExecStart=/opt/iac-flask-demo/venv/bin/python /opt/iac-flask-demo/app.py
          Restart=always

          [Install]
          WantedBy=multi-user.target
        owner: root
        group: root
        mode: '0644'

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Uruchomienie uslugi Flask
      systemd:
        name: iac-flask-demo
        state: started
        enabled: yes
